apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  labels:
    app.kubernetes.io/name: web
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: web
    spec:
      containers:
        - name: web
          # 佔位映像，請替換成你自己的應用映像
          image: nginx:1.27-alpine
          ports:
            - name: http
              containerPort: 80
          envFrom:
            - configMapRef:
                name: web-config
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          securityContext:
            allowPrivilegeEscalation: false
            # 換成你自己的應用（非 root 監聽 >1024 埠）後，建議改用更嚴格設定：
            #   runAsNonRoot: true
            #   capabilities:
            #     drop: [ALL]
            # 註：nginx 官方映像以 root 啟動並需 CHOWN/SETUID/SETGID，故 base 不 drop ALL。
