apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: app-prod
namePrefix: prod-

resources:
  - ../../base

patches:
  - path: replicas.yaml
    target:
      kind: Deployment
      name: web
  - path: resources.yaml
    target:
      kind: Deployment
      name: web

configMapGenerator:
  - name: web-config
    behavior: merge
    literals:
      - APP_ENV=prod
      - APP_DEBUG=false

images:
  - name: nginx
    newTag: 1.27-alpine
